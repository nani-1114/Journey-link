version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: journeylink-backend-prod
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME:-${DB_USER}}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
      - journeylink.jwt.secret=${JWT_SECRET}

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: journeylink-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
