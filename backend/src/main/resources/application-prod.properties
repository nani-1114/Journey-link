# PostgreSQL Configuration (Prod Profile)
spring.datasource.url=jdbc:postgresql://${DB_HOST:journeylink-db.crcawkq2aeeg.ap-south-1.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USERNAME:${DB_USER:journeylink}}
spring.datasource.password=${DB_PASSWORD:journeylink123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable Spring Boot Actuator Web Endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
